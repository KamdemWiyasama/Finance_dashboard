<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <form action="/add" method="POST">
        <label for="category">Category:</label>
        <input type="text" id="category" name="category" placeholder="Category" required>
        <br><br>
        <label for="amount">Amount:</label>
        <input type="number" id="amount" name="amount" placeholder="Amount" step="0.01" required>
        <br><br>
        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required>
        <br><br>
        <button type="submit">Add Expense</button>
    </form>
    <br><br>
    <table>
        <thead>
            <tr>
                <th>Category</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for expense in expenses %}
            <tr>
                <td>{{ expense[1] }}</td>
                <td>{{ expense[2] }}</td>
                <td>{{ expense[3] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <section class="Base currency input">
        <form id="convert-form" action="/convert" method="GET">
            <label for = "from_currency">From Currency:</label>
            <input type="text" id="from_currency" name="from" placeholder="From Currency" required>
            <br><br>
            <label for ="to_currency">To Currency:</label>
            <input type="text" id="to_currency" name="to" placeholder="To Currency" required>
            <br><br>
            <label for="amount">Amount:</label>
            <input type="number" id="amount" name="amount" placeholder="Amount" step="0.01" required>
            <br><br>
            <button type="button" onclick="convert()">Convert</button>
            <p id="converted_amount"></p>
        </form>

        <script>
            function convert() {
                // Implementation for currency conversion
                const amount = document.querySelector("#convert-form #amount").value;
                const from = document.querySelector("#convert-form #from_currency").value;
                const to = document.querySelector("#convert-form #to_currency").value;

                if (!amount || !from || !to) {
                    alert("Please fill in all fields.");
                    return;
                }
                fetch(`/convert?from=${from}&to=${to}&amount=${amount}`)
                    .then(response => response.json())
                    .then(data => {
                        if(data.converted!== undefined){
                            document.getElementById("converted_amount").textContent = `Converted Amount: ${data.converted.toFixed(2)} ${to}`;
                        } else {
                            document.getElementById("converted_amount").textContent = "Conversion failed. Please check the currency codes and try again.";
                        }
                    })
                    .catch(error => {
                        console.error("Error:", error);
                    });
            }
        </script>

    </section>
</body>
</html>
